<!DOCTYPE html>
<html>
<head>
    <title>Lecture Pre-reading Assistant</title>
</head>
<body>
    <h1> Upload a lecture PDF</h1>
    <form action="upload" method="post" enctype="multipart/form-data">
        <div>
            <label for="file">Choose file to upload</label>
            <input type="file" id="file" name="lectureSlides" accept=".pdf" multiple />

        </div>
        <div>
            <button>Submit</button>
        </div>
    </form>
</body>
</html>
